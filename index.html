<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ledger &amp; Key — Mortgage &amp; Real Estate Recruiting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600;8..60,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ivory: #F7F2E9;
    --ivory-deep: #EFE7D8;
    --navy: #1B2A41;
    --navy-soft: #2C3E58;
    --brass: #B8893E;
    --brass-light: #D6AC6A;
    --stone: #7A7568;
    --white: #FFFFFF;
    --line: rgba(27,42,65,0.10);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--ivory);
    color: var(--navy);
    font-family: 'Inter', sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  h1, h2, h3, .serif {
    font-family: 'Source Serif 4', serif;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--navy);
  }

  a { color: inherit; text-decoration: none; }

  img { max-width: 100%; display: block; }

  .wrap {
    max-width: 1180px;
    margin: 0 auto;
    padding: 0 32px;
  }

  .key-glyph {
    display: inline-block;
    width: 16px;
    height: 16px;
    vertical-align: middle;
    flex-shrink: 0;
  }
  .key-glyph svg { width: 100%; height: 100%; display: block; }

  header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(247,242,233,0.92);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--line);
  }
  .nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    max-width: 1180px;
    margin: 0 auto;
  }
  .logo {
    font-family: 'Source Serif 4', serif;
    font-weight: 700;
    font-size: 21px;
    display: flex;
    align-items: center;
    gap: 8px;
    letter-spacing: -0.01em;
  }
  .logo .key-glyph { width: 18px; height: 18px; }
  .nav-links {
    display: flex;
    align-items: center;
    gap: 36px;
    font-size: 14.5px;
    font-weight: 500;
  }
  .nav-links a { color: var(--navy-soft); transition: color 0.2s; }
  .nav-links a:hover { color: var(--brass); }
  .nav-cta {
    background: var(--navy);
    color: var(--ivory) !important;
    padding: 11px 22px;
    border-radius: 3px;
    font-weight: 600;
    font-size: 14px;
    transition: background 0.2s;
  }
  .nav-cta:hover { background: var(--navy-soft); }
  .nav-toggle { display: none; }

  .hero {
    position: relative;
    padding: 96px 32px 100px;
    overflow: hidden;
    background:
      repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 47px,
        var(--line) 47px,
        var(--line) 48px
      );
  }
  .hero::before {
    content: "";
    position: absolute;
    top: 0; right: -10%;
    width: 60%;
    height: 100%;
    background: radial-gradient(ellipse at top right, rgba(184,137,62,0.10), transparent 60%);
    pointer-events: none;
  }
  .hero-inner {
    max-width: 1180px;
    margin: 0 auto;
    position: relative;
  }
  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--brass);
    background: var(--white);
    border: 1px solid var(--line);
    padding: 7px 14px;
    border-radius: 20px;
    margin-bottom: 28px;
  }
  .hero h1 {
    font-size: clamp(40px, 5.4vw, 68px);
    line-height: 1.04;
    max-width: 880px;
    margin-bottom: 26px;
  }
  .hero h1 em {
    font-style: italic;
    color: var(--brass);
  }
  .hero-sub {
    font-size: 19px;
    color: var(--navy-soft);
    max-width: 560px;
    margin-bottom: 40px;
  }
  .hero-actions {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 64px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 16px 30px;
    border-radius: 3px;
    font-weight: 600;
    font-size: 15.5px;
    transition: all 0.2s;
    border: 1px solid transparent;
  }
  .btn-primary {
    background: var(--navy);
    color: var(--ivory);
  }
  .btn-primary:hover { background: var(--navy-soft); transform: translateY(-1px); }
  .btn-secondary {
    background: transparent;
    color: var(--navy);
    border-color: var(--navy);
  }
  .btn-secondary:hover { background: var(--navy); color: var(--ivory); }

  .hero-stats {
    display: grid;
    grid-template-columns: repeat(3, auto);
    gap: 56px;
    border-top: 1px solid var(--line);
    padding-top: 32px;
    width: fit-content;
  }
  .stat-num {
    font-family: 'Source Serif 4', serif;
    font-size: 34px;
    font-weight: 600;
    color: var(--navy);
    line-height: 1;
    margin-bottom: 6px;
  }
  .stat-label {
    font-size: 13.5px;
    color: var(--stone);
  }

  section { padding: 96px 0; }
  .section-head {
    max-width: 640px;
    margin-bottom: 56px;
  }
  .section-eyebrow {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--brass);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-head h2 {
    font-size: clamp(28px, 3.4vw, 40px);
    line-height: 1.12;
  }
  .section-head p {
    color: var(--navy-soft);
    font-size: 17px;
    margin-top: 16px;
  }

  .roles {
    background: var(--white);
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }
  .role-row {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr auto;
    gap: 24px;
    align-items: center;
    padding: 24px 0;
    border-bottom: 1px solid var(--line);
  }
  .role-row:last-child { border-bottom: none; }
  .role-title {
    font-family: 'Source Serif 4', serif;
    font-weight: 600;
    font-size: 18px;
  }
  .role-meta {
    font-size: 14px;
    color: var(--stone);
  }
  .role-tag {
    display: inline-block;
    font-size: 12.5px;
    font-weight: 600;
    color: var(--navy);
    background: var(--ivory-deep);
    padding: 5px 11px;
    border-radius: 3px;
    width: fit-content;
  }
  .role-link {
    font-size: 14px;
    font-weight: 600;
    color: var(--brass);
    white-space: nowrap;
  }
  .role-link:hover { color: var(--navy); }

  .how-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
  }
  .how-card {
    background: var(--ivory);
    padding: 40px 36px;
  }
  .how-mark {
    width: 36px;
    height: 36px;
    margin-bottom: 24px;
  }
  .how-card h3 {
    font-size: 21px;
    margin-bottom: 12px;
  }
  .how-card p {
    color: var(--navy-soft);
    font-size: 15.5px;
  }

  .why {
    background: var(--navy);
    color: var(--ivory);
  }
  .why .section-head h2,
  .why .section-head p { color: var(--ivory); }
  .why .section-head p { color: rgba(247,242,233,0.7); }
  .why .section-eyebrow { color: var(--brass-light); }
  .why-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 36px 48px;
  }
  .why-item {
    display: flex;
    gap: 18px;
  }
  .why-icon {
    width: 22px;
    height: 22px;
    flex-shrink: 0;
    margin-top: 3px;
  }
  .why-item h4 {
    font-family: 'Source Serif 4', serif;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .why-item p {
    color: rgba(247,242,233,0.65);
    font-size: 15px;
  }

  .cta-band {
    background: var(--ivory-deep);
    border-top: 1px solid var(--line);
  }
  .cta-band-inner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 32px;
    flex-wrap: wrap;
  }
  .cta-band h2 { font-size: clamp(26px, 3vw, 34px); max-width: 460px; }
  .cta-band-actions { display: flex; gap: 16px; flex-wrap: wrap; }

  footer {
    background: var(--navy);
    color: rgba(247,242,233,0.6);
    padding: 64px 0 32px;
  }
  .footer-grid {
    display: grid;
    grid-template-columns: 2fr 1fr 1fr 1fr;
    gap: 40px;
    padding-bottom: 48px;
    border-bottom: 1px solid rgba(247,242,233,0.12);
    margin-bottom: 28px;
  }
  .footer-logo {
    font-family: 'Source Serif 4', serif;
    font-weight: 700;
    font-size: 19px;
    color: var(--ivory);
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }
  .footer-desc { font-size: 14px; max-width: 280px; }
  .footer-col h5 {
    color: var(--ivory);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .footer-col a {
    display: block;
    font-size: 14.5px;
    margin-bottom: 11px;
    transition: color 0.2s;
  }
  .footer-col a:hover { color: var(--brass-light); }
  .footer-bottom {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    flex-wrap: wrap;
    gap: 12px;
  }

  @media (max-width: 860px) {
    .nav-links { display: none; }
    .hero { padding: 64px 24px 64px; }
    .wrap, .nav { padding-left: 24px; padding-right: 24px; }
    .hero-stats { grid-template-columns: 1fr; gap: 20px; }
    .how-grid { grid-template-columns: 1fr; }
    .why-grid { grid-template-columns: 1fr; }
    .role-row {
